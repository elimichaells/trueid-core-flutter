name: trueid_core
description: Shared core for the TrueID Flutter SDKs — initialization/API keys and standalone selfie capture with guided liveness.
version: 1.0.2
homepage: https://github.com/elimichaells/trueid-core-flutter
repository: https://github.com/elimichaells/trueid-core-flutter
issue_tracker: https://github.com/elimichaells/trueid-core-flutter/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.trueid.core.flutter
        pluginClass: TrueIdCorePlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
